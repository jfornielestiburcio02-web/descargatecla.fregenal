<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarga Tecla</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #1e2a38;
        }

        p {
            color: #444;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .logo {
            width: 90px;
            margin-bottom: 15px;
        }

        .btn-download {
            display: inline-block;
            margin-top: 15px;
            padding: 14px 25px;
            background: #1e88e5;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn-download:hover {
            background: #1565c0;
            transform: scale(1.03);
        }

        .note {
            font-size: 12px;
            color: #777;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="card">

        <img class="logo" src="https://tecla-ayto-fregenal-de-la-sierra.vercel.app/iconoteclita.png">

        <h1>Descarga Tecla</h1>

        <p>
            Aquí se ofrece el instalador oficial de la plataforma móvil para <strong>ANDROID</strong>.
        </p>

        <p>
            Este es un instalador externo a la web oficial, usado por posibles problemas de compatibilidad o acceso.
        </p>

        <a href="tecla.apk" download class="btn-download">
            DESCARGAR TECLA (APK)
        </a>

        <p class="note">
            Asegúrate de activar “orígenes desconocidos” en tu dispositivo Android.
        </p>

    </div>

</body>

</html>
